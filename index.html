<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliyx - Minecraft Builder</title>
    <meta name="description"
        content="Eu sou o Melhor builder de Minecraft do Brasil! Dps do koski (eu acho) e eu amo loiras">
    <meta name="keywords" content="Minecraft, builder, professional, portfolio, Marketplace, Sliyx">

    <!-- Favicons for better SEO and browser support -->
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/Logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/Logo.png">
    <link rel="apple-touch-icon" href="assets/images/Logo.png">
    <link rel="shortcut icon" href="assets/images/Logo.png">

    <!-- Open Graph meta tags for better social media sharing -->
    <meta property="og:title" content="Sliyx - Professional Minecraft Builder">
    <meta property="og:description"
        content="Professional Minecraft builder with 10+ years experience. Co-owner of Xenos Builds, Athion staff since 2017, worked with Minecraft Marketplace teams.">
    <meta property="og:image" content="assets/images/Logo.png">
    <meta property="og:url" content="https://Sliyx.github.io/Sliyx-Website/">
    <meta property="og:type" content="website">

    <!-- Twitter Card meta tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Sliyx - Professional Minecraft Builder">
    <meta name="twitter:description"
        content="Professional Minecraft builder with 10+ years experience. Co-owner of Xenos Builds, Athion staff since 2017, worked with Minecraft Marketplace teams.">
    <meta name="twitter:image" content="assets/images/Logo.png">

    <!-- Additional meta tags for content discovery -->
    <meta name="author" content="Sliyx">
    <meta name="robots" content="index, follow, imageindex">
    <meta name="googlebot" content="index, follow, imageindex">
    <meta name="theme-color" content="#D5A12F">

    <!-- Sitemap reference -->
    <link rel="sitemap" type="application/xml" href="sitemap.xml">

    <!-- Simple embeddable gallery link -->
    <link rel="alternate" type="text/html" href="images.html" title="Portfolio Images">
    <meta name="image-gallery" content="images.html">

    <!-- JSON-LD Structured Data for better SEO -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Sliyx",
        "jobTitle": "Professional Minecraft Builder",
        "description": "Professional Minecraft builder with 10+ years experience. Co-owner of Xenos Builds, Athion staff since 2017.",
        "url": "https://Sliyx.github.io/Sliyx-Website/",
        "image": "https://Sliyx.github.io/Sliyx-Website/assets/images/Logo.png",
        "worksFor": {
            "@type": "Organization",
            "name": "Xenos Builds"
        },
        "knowsAbout": ["Minecraft", "3D Building", "Game Design", "Digital Architecture"]
    }
    </script>

    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Navigation -->
    <div id="navbar-container"></div>

    <!-- Background with gradient overlay -->
    <div class="background-container">
        <div class="background-image"></div>
        <div class="gradient-overlay"></div>
    </div>

    <!-- Hero Section -->
    <section class="hero-section">
        <audio src="Its-Been.mp3" class="clicou"></audio>
        <div class="container">
            <div class="hero-content">
                <h1 class="portfolio-title">Portfólio</h1>
            </div>
        </div>
    </section>

    <!-- Portfolio Grid -->
    <section class="portfolio-section">
        <div class="container">
            <div class="portfolio-grid">
                <!-- Row 1 -->
                <div class="portfolio-row">
                    <!-- Yuanhua Pagoda -->
                    <div class="build-card" data-build="yuanhua-pagoda">
                        <div class="image-container">
                            <img src="builds/SliyxBuild1.png" alt="Arena de duelos" class="build-image">
                            <div class="build-overlay">
                                <h3 class="build-title">Arena de duelo</h3>
                            </div>
                        </div>
                    </div>

                    <!-- Skull Castle -->
                    <div class="build-card" data-build="skull-castle">
                        <div class="image-container">
                            <img src="builds/SliyxBuild2.png" alt="Trem do faroeste" class="build-image">
                            <div class="build-overlay">
                                <h3 class="build-title">Trem do Faroeste</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Row 2 -->
                <div class="portfolio-row">
                    <!-- Christmas 2231 -->
                    <div class="build-card" data-build="christmas-build-battle">
                        <div class="image-container">
                            <img src="builds/SliyxBuild3.png" alt="Lobby da Cubo" class="build-image">
                            <div class="build-overlay">
                                <h3 class="build-title">Lobby da Cubo</h3>
                            </div>
                        </div>
                    </div>

                    <!-- CMA -->
                    <div class="build-card" data-build="cma">
                        <div class="image-container">
                            <img src="builds/SliyxBuild4.png" alt="Castelo montanhoso" class="build-image">
                            <div class="build-overlay">
                                <h3 class="build-title">Castelo Montanhoso</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Row 3 -->
                <div class="portfolio-row">
                    <!-- Aurelios -->
                    <div class="build-card" data-build="aurelios">
                        <div class="image-container">
                            <img src="builds/SliyxBuild5.png" alt="Templo da floresta" class="build-image">
                            <div class="build-overlay">
                                <h3 class="build-title">Templo da Floresta</h3>
                            </div>
                        </div>
                    </div>
                    <!-- Anúncio -->
                    <div class="build-card" data-build="aurelios">
                        <div class="image-container">
                            <img src="builds/Essa_pode_ser_sua_build.png" alt="Anúncio" class="build-image">
                            <div class="build-overlay">
                                <h3 class="build-title">Contrate-me</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
    </section>

    <!-- Modal for build details -->
    <div id="buildModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-body">
                <div class="modal-images">
                    <div class="image-carousel">
                        <img id="modalImage" src="" alt="" class="modal-main-image">
                        <div class="carousel-controls">
                            <button class="prev-btn">&lt;</button>
                            <button class="next-btn">&gt;</button>
                        </div>
                    </div>
                    <div class="image-thumbnails"></div>
                </div>
                <div class="modal-info">
                    <h2 id="modalTitle"></h2>
                    <div id="modalDescription"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <!-- Search engine discoverable images -->
    <div style="display: none;" aria-hidden="true">
        <p>Portfolio images: <a href="images.html">Sliyx Minecraft builds gallery</a></p>
        <img src="builds/athion-builds/Loriostrond/LoriostrondNew.png" alt="Loriostrond - Elven Stronghold by Sliyx">
        <img src="builds/athion-builds/Aurelios_the_Lost_City/Atlantis.png" alt="Aurelios - Underwater City by Sliyx">
        <img src="builds/athion-builds/Heliox_Station/SpaceCinematic.png" alt="Heliox Station - Space Station by Sliyx">
        <img src="builds/xenos-builds/XenosCastle/XenosCastle.png" alt="Xenos Castle - Medieval Fortress by Sliyx">
        <img src="builds/xenos-builds/DragonPoint/DragonPoint.jpeg"
            alt="Dragon Point Castle - Dragon-themed Fortress by Sliyx">
        <img src="builds/personal-projects/Skull_Castle/SkullCastle.png" alt="Skull Castle - Gothic Fortress by Sliyx">
        <img src="builds/personal-projects/MrBeast/BeastFront.png" alt="MrBeast Competition by Sliyx">
    </div>

    <script src="shared/navbar.js"></script>
    <script src="shared/footer.js"></script>
    <script src="assets/js/script.js"></script>
    <script>
        // Load navbar and footer
        document.addEventListener('DOMContentLoaded', function () {
            loadNavbar('portfolio');
            loadFooter();
        });
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const curiosoButton = document.querySelector(".modo-loira");
            const audio = document.querySelector(".clicou");

            curiosoButton.addEventListener("click", () => {
                audio.play();
            });
        });
    </script>
</body>

</html>
